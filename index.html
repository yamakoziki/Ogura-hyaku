<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>小倉百人一首</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#e891af">
</head>
<body>
    <div class="container">
        <header>
            <h1>小倉百人一首</h1>
            <p class="header-sub">競技かるた 練習システム</p>
        </header>

        <main>
            <!-- メインアクション -->
            <div class="main-actions">
                <button id="randomBtn" class="btn btn-primary btn-large">ランダム選択</button>
                <button id="showAnswerBtn" class="btn btn-outline btn-large">答えを表示</button>
            </div>

            <!-- 詩カード -->
            <div class="poem-display">
                <div id="poemCard" class="poem-card">
                    <div class="poem-meta">
                        <span class="poem-number-badge" id="poemNumber">—</span>
                        <span class="poem-author" id="poemAuthor">歌人を選択してください</span>
                    </div>
                    <div class="poem-text">
                        <div class="kami-no-ku">
                            <span id="kamiNoKu">上の句が表示されます</span>
                        </div>
                        <div class="shimo-no-ku" id="shimoNoKuDiv" style="display: none;">
                            <span id="shimoNoKu">下の句が表示されます</span>
                        </div>
                    </div>
                    <div class="poem-reading" id="poemReading" style="display: none;">
                        <span class="detail-label">読み</span>
                        <span id="readingText"></span>
                    </div>
                    <div class="poem-meaning" id="poemMeaning" style="display: none;">
                        <span class="detail-label">意味</span>
                        <span id="meaningText"></span>
                    </div>
                </div>
            </div>

            <!-- 音声操作 -->
            <div class="speech-actions">
                <button id="readBtn" class="btn btn-secondary">読み上げ</button>
                <button id="readCompleteBtn" class="btn btn-secondary">全部読む</button>
                <button id="readShimoBtn" class="btn btn-secondary">下の句</button>
                <button id="pauseResumeBtn" class="btn btn-pause" style="display: none;">一時停止</button>
                <button id="stopBtn" class="btn btn-ghost">停止</button>
                <button id="repeatBtn" class="btn btn-ghost">リピート</button>
            </div>

            <!-- 設定（折りたたみ） -->
            <details class="settings-section">
                <summary class="settings-toggle">⚙ 設定</summary>
                <div class="settings-grid">
                    <div class="setting-row">
                        <label for="speechRate">読み上げ速度</label>
                        <div class="slider-wrap">
                            <input type="range" id="speechRate" min="0.3" max="2.0" step="0.1" value="0.8">
                            <span id="speechRateValue">0.8</span>
                        </div>
                    </div>
                    <div class="setting-row">
                        <label for="pauseDuration">句間の間隔</label>
                        <div class="slider-wrap">
                            <input type="range" id="pauseDuration" min="0" max="2.0" step="0.1" value="0.5">
                            <span id="pauseDurationValue">0.5秒</span>
                        </div>
                    </div>
                    <div class="setting-row">
                        <label for="pronunciationControl">は/わ 発音制御</label>
                        <label class="switch">
                            <input type="checkbox" id="pronunciationControl" checked>
                            <span class="slider"></span>
                        </label>
                    </div>
                    <div class="setting-row">
                        <label for="intonationControl">詠歌調の抑揚</label>
                        <label class="switch">
                            <input type="checkbox" id="intonationControl" checked>
                            <span class="slider"></span>
                        </label>
                    </div>
                    <div class="setting-row">
                        <label for="darkModeToggle">ダークモード</label>
                        <label class="switch">
                            <input type="checkbox" id="darkModeToggle">
                            <span class="slider"></span>
                        </label>
                    </div>
                    <div class="setting-row history-row">
                        <button id="showHistoryBtn" class="btn btn-outline btn-sm">練習履歴</button>
                        <button id="clearHistoryBtn" class="btn btn-ghost btn-sm">履歴クリア</button>
                    </div>
                </div>
            </details>

            <!-- 歌一覧 -->
            <div class="poem-list-section">
                <div class="list-controls">
                    <div class="search-box">
                        <span class="search-icon">🔍</span>
                        <input type="text" id="searchInput" placeholder="歌人名や歌で検索…">
                    </div>
                    <div class="sort-buttons">
                        <button id="sortByNumber" class="sort-btn active">番号</button>
                        <button id="sortByAuthor" class="sort-btn">歌人</button>
                        <button id="sortByKami" class="sort-btn">上の句</button>
                        <button id="sortByShimo" class="sort-btn">下の句</button>
                        <button id="sortBySeason" class="sort-btn">季節</button>
                    </div>
                </div>
                <div id="poemList" class="list-container"></div>
            </div>
        </main>

        <!-- 練習履歴モーダル -->
        <div id="historyModal" class="modal" style="display: none;">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>練習履歴</h3>
                    <button id="closeHistoryModal" class="btn-icon">✕</button>
                </div>
                <div class="modal-body">
                    <div id="historyList" class="history-list"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="karuta-data.js"></script>
    <script src="script.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function() {
                navigator.serviceWorker.register('./sw.js');
            });
        }

        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            const installBtn = document.createElement('button');
            installBtn.textContent = 'アプリをインストール';
            installBtn.className = 'install-btn';
            installBtn.addEventListener('click', () => {
                deferredPrompt.prompt();
                deferredPrompt.userChoice.then(() => {
                    deferredPrompt = null;
                    installBtn.remove();
                });
            });
            document.body.appendChild(installBtn);
        });

        function isIOS() {
            return /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
        }
        function isInStandaloneMode() {
            return (window.navigator.standalone === true);
        }
        if (isIOS() && !isInStandaloneMode()) {
            setTimeout(() => {
                const div = document.createElement('div');
                div.className = 'ios-install-banner';
                div.innerHTML = `
                    <p>ホーム画面に追加できます</p>
                    <p>Safari の共有ボタン → 「ホーム画面に追加」</p>
                    <button onclick="this.closest('.ios-install-banner').remove()">閉じる</button>
                `;
                document.body.appendChild(div);
            }, 3000);
        }
    </script>
</body>
</html>
